# MIXXEA production Nginx config (Vite SPA)
# Copy to: /etc/nginx/sites-available/mixxea
# Enable with:
#   sudo ln -s /etc/nginx/sites-available/mixxea /etc/nginx/sites-enabled/mixxea
#   sudo nginx -t && sudo systemctl reload nginx
#
# Edit placeholders:
#   - YOUR_DOMAIN

server {
    listen 80;
    listen [::]:80;
    server_name YOUR_DOMAIN www.YOUR_DOMAIN;

    # ACME challenge path for Certbot.
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Redirect all HTTP traffic to HTTPS.
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name YOUR_DOMAIN www.YOUR_DOMAIN;

    # SSL files managed by Certbot.
    ssl_certificate /etc/letsencrypt/live/YOUR_DOMAIN/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/YOUR_DOMAIN/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Vite build output on VPS.
    root /var/www/mixxea/current/dist;
    index index.html;

    # Compression.
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/javascript
        application/json
        application/xml
        application/rss+xml
        image/svg+xml
        font/woff
        font/woff2;

    # Security headers.
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

    # SPA routing fallback.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Immutable static assets (hashed files).
    location ~* \.(?:js|mjs|css|png|jpg|jpeg|gif|svg|webp|avif|ico|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Never cache HTML shell.
    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    # Block hidden files.
    location ~ /\.(?!well-known).* {
        deny all;
        access_log off;
        log_not_found off;
    }
}

# Next.js variant (reference only):
# - Use proxy_pass http://127.0.0.1:3000 in location /
# - Keep websocket headers:
#   proxy_set_header Upgrade $http_upgrade;
#   proxy_set_header Connection "upgrade";
