name: Deploy MIXXEA (Vite)

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      NODE_VERSION: "20"

    steps:
      - name: Preflight required secrets
        shell: bash
        run: |
          set -euo pipefail
          missing=0

          if [ -z "${{ secrets.VPS_HOST }}" ]; then echo "Missing VPS_HOST"; missing=1; fi
          if [ -z "${{ secrets.VPS_USER }}" ]; then echo "Missing VPS_USER"; missing=1; fi
          if [ -z "${{ secrets.VPS_PATH }}" ]; then echo "Missing VPS_PATH"; missing=1; fi

          # DO NOT inline VPS_SSH_KEY here (it's multi-line). Just check it via expression:
          if [ "${{ secrets.VPS_SSH_KEY != '' }}" != "true" ]; then echo "Missing VPS_SSH_KEY"; missing=1; fi

          exit $missing

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        shell: bash
        run: |
          set -euo pipefail
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi

      - name: Validate figma asset imports
        shell: bash
        run: |
          set -euo pipefail
          npm run check:figma-assets

      - name: Build Vite app
        shell: bash
        run: |
          set -euo pipefail
          npm run build
          [ -d dist ] || (echo "Build output missing: ./dist" && exit 1)

      - name: Setup SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.VPS_SSH_KEY }}

      - name: Add VPS to known_hosts
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          ssh-keyscan -H "${{ secrets.VPS_HOST }}" >> ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts

      - name: Ensure VPS directories exist
        shell: bash
        run: |
          set -euo pipefail
          ssh "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" \
            "mkdir -p '${{ secrets.VPS_PATH }}/current/dist' '${{ secrets.VPS_PATH }}/releases' '${{ secrets.VPS_PATH }}/shared'"

      - name: Deploy dist to VPS
        shell: bash
        run: |
          set -euo pipefail
          rsync -az --delete -e "ssh" ./dist/ "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:${{ secrets.VPS_PATH }}/current/dist/"

      - name: Reload Nginx
        shell: bash
        run: |
          set -euo pipefail
          ssh "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" \
            "sudo nginx -t && sudo systemctl reload nginx && echo 'Nginx reload OK'"
