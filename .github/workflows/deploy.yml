name: Deploy MIXXEA

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Detect package manager and stack
        id: detect
        run: |
          if [ -f pnpm-lock.yaml ]; then
            echo "pm=pnpm" >> "$GITHUB_OUTPUT"
          else
            echo "pm=npm" >> "$GITHUB_OUTPUT"
          fi

          if grep -q '"next"' package.json; then
            echo "stack=next" >> "$GITHUB_OUTPUT"
          elif grep -q '"vite"' package.json; then
            echo "stack=vite" >> "$GITHUB_OUTPUT"
          else
            echo "Unknown stack. Expected Next.js or Vite."
            exit 1
          fi

      - name: Enable Corepack for pnpm
        if: steps.detect.outputs.pm == 'pnpm'
        run: |
          corepack enable
          corepack prepare pnpm@latest --activate

      - name: Install dependencies
        run: |
          if [ "${{ steps.detect.outputs.pm }}" = "pnpm" ]; then
            pnpm install --frozen-lockfile
          else
            if [ -f package-lock.json ]; then
              npm ci
            else
              npm install
            fi
          fi

      - name: Build
        run: |
          if [ "${{ steps.detect.outputs.pm }}" = "pnpm" ]; then
            pnpm build
          else
            npm run build
          fi

      - name: Setup SSH key
        env:
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$VPS_SSH_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H "${{ secrets.VPS_HOST }}" >> ~/.ssh/known_hosts

      - name: Rsync repository to VPS
        run: |
          rsync -az --delete \
            --exclude ".git" \
            --exclude ".github" \
            --exclude "node_modules" \
            --exclude "dist" \
            --exclude ".next" \
            -e "ssh -i ~/.ssh/id_rsa" \
            ./ "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:${{ secrets.VPS_PATH }}/current/"

      - name: Build on VPS and restart/reload
        run: |
          ssh -i ~/.ssh/id_rsa "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" \
          "APP_STACK='${{ steps.detect.outputs.stack }}' PM='${{ steps.detect.outputs.pm }}' VPS_PATH='${{ secrets.VPS_PATH }}' bash -s" <<'EOF'
          set -euo pipefail
          cd "${VPS_PATH}/current"

          if [ "${PM}" = "pnpm" ]; then
            pnpm install --frozen-lockfile
            pnpm build
          else
            if [ -f package-lock.json ]; then
              npm ci
            else
              npm install
            fi
            npm run build
          fi

          if [ "${APP_STACK}" = "next" ]; then
            sudo systemctl restart mixxea.service
            sudo systemctl status mixxea.service --no-pager --full | head -n 12
          else
            sudo nginx -t
            sudo systemctl reload nginx
          fi
          EOF
